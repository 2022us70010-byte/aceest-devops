name: ACEest Fitness CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8
      
      - name: Lint with flake8
        run: |
          flake8 app.py || true

  docker-build:
    name: Docker Image Assembly
    runs-on: ubuntu-latest
    needs: build-and-lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build Docker image
        run: docker build -t aceest-fitness:${{ github.sha }} .
      
      - name: Verify Docker image was created
        run: docker images aceest-fitness

  automated-tests:
    name: Automated Testing (in Docker)
    runs-on: ubuntu-latest
    needs: docker-build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run Pytest suite
        run: |
          pytest test_app.py -v --tb=short
      
      - name: Build Docker and run tests inside container
        run: |
          docker build -t aceest-fitness-test .
          docker run --rm aceest-fitness-test pytest test_app.py -v