# Stable: 9 replicas = 90% traffic
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-stable
spec:
  replicas: 9
  selector:
    matchLabels:
      app: aceest-fitness
      track: stable
  template:
    metadata:
      labels:
        app: aceest-fitness
        track: stable
    spec:
      containers:
      - name: aceest
        image: krishnakumar2022us70010/aceest-fitness:v1.0
        ports:
        - containerPort: 5000
---
# Canary: 1 replica = 10% traffic
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-fitness
      track: canary
  template:
    metadata:
      labels:
        app: aceest-fitness
        track: canary
    spec:
      containers:
      - name: aceest
        image: krishnakumar2022us70010/aceest-fitness:v2.0
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-canary-service
spec:
  selector:
    app: aceest-fitness      # selects BOTH stable and canary pods
  ports:
  - port: 80
    targetPort: 5000
  type: NodePort