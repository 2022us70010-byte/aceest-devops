apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-rolling
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: aceest-fitness
  template:
    metadata:
      labels:
        app: aceest-fitness
    spec:
      containers:
      - name: aceest-fitness
        image: krishnakumar2022us70010/aceest-fitness:v2.0
        ports:
        - containerPort: 5000